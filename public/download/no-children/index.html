<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Download Your Divorce Kit</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0f1c;
      color: white;
      text-align: center;
      padding: 40px;
    }
    .container {
      max-width: 700px;
      margin: auto;
    }
    .download-btn {
      display: none;
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 20px;
      background: #1a73e8;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Thank You For Your Purchase</h1>
    <p>Your divorce kit is ready.</p>

    <p id="status">Preparing your download...</p>

    <a id="downloadBtn" class="download-btn" target="_blank">
      Download Your Kit
    </a>

    <p style="margin-top:40px;font-size:14px;">
      Please save the file immediately after downloading.
    </p>
  </div>

  <script>
    const files = {
      // KEEP YOUR EXISTING FULL FILE LIST HERE
    };

    const params = new URLSearchParams(window.location.search);
    const state = (params.get("state") || "").toLowerCase().trim();
    const token = (params.get("token") || "").toLowerCase().trim();

    const status = document.getElementById("status");
    const btn = document.getElementById("downloadBtn");

    if (!state) {
      status.textContent = "Invalid download link.";
    } else {
      const expectedToken = state + "-secure";

      if (token !== expectedToken) {
        status.textContent = "Invalid download link.";
      } else {
        const key = state + "-no-children";
        const file = files[key];

        if (!file) {
          status.textContent = "Download unavailable for this state.";
        } else {
          btn.href = file;
          btn.style.display = "inline-block";
          status.textContent = "Your download is ready.";
        }
      }
    }
  </script>

</body>
</html>
